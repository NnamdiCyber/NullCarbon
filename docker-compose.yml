version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nullcarbon-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: nullcarbon
      POSTGRES_USER: nullcarbon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nullcarbon}
    volumes:
      - nullcarbon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nullcarbon']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nullcarbon-pgdata:
